    <body>
        <!-- Header Component -->
        <header class="nav-component bg-white sticky-top"></header>
        <!-- Main Body -->
        <div id="main-body">
            <section class="mt-80 contact-banner">
                <div class="container-xl py-5 h-100">
                    <div class="breadcrumb-card my-lg-4 my-3 px-4 py-3 w-75">
                        <h2 class="text-dark mb-1 fw-bold font-28">Uttrakhand Tour and Travels</h2>
                        <p class="mb-0 align-self-center">
                            <a href="" class="font-12 d-inline-block lh-2 text-decoration-none text-white fw-bold">Home</a>
                            <span class="font-12 d-inline-block lh-2 text-decoration-none text-white">
                                <i class="fas fa-arrow-right"></i>
                            </span>
                            <a href="" class="font-12 d-inline-block lh-2 text-decoration-none text-white fw-bold">Uttrakhand Tour and Travels</a>
                        </p>
                    </div>
                </div>
            </section>
            <section class="py-lg-3">
                <div class="container-xl py-4 py-md-5">
                    <div class="row gx-lg-5">
                        <div class="col-lg-5 col-md-5 col-12 mb-4 mb-md-0">
                            <h4 class="font-28 fw-bold mb-4 pb-2 heading_brdr ms-0">Contact Us</h4>
                            <div class="card rounded-0">
                                <div class="card-body p-3">
                                    <p class="text-uppercase text-secondary font-16 fw-600 mb-1">Address</p>
                                    <p class="font-14 text-dark mb-2 fw-500">Teachers colony kuanwala, Dehra Dun, India, Uttarakhand</p>
                                    <p class="text-uppercase text-secondary font-16 fw-600 mb-1">Call Us</p>
                                    <p class="font-14 text-dark mb-2 fw-500">+91 81267 64684</p>
                                    <p class="text-uppercase text-secondary font-16 fw-600 mb-1">Mail Us</p>
                                    <p class="font-14 mb-2 fw-500">
                                        <a href="mailto:hilltoprides@gmail.com" class="text-decoration-none text-dark"> hilltoprides@gmail.com</a>
                                    </p>
                                    <p class="text-uppercase text-secondary font-16 fw-600 mb-1">Website</p>
                                    <p class="font-14 mb-1 fw-500">
                                        <a href="https://hilltoprides.com/" class="text-decoration-none text-dark">https://hilltoprides.com/</a>
                                    </p>
                                </div>
                                <div class="card-footer p-0 map">
                                    <div id="map">
                                        <iframe
                                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3440.849224814901!2d78.08239177430379!3d30.41201940106389!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3908d7134a11ba2b%3A0x8fad6d1abab79271!2sHill%20top%20GUEST%20HOUSE!5e0!3m2!1sen!2sin!4v1728045465335!5m2!1sen!2sin"
                                            width="100%"
                                            height="280"
                                            style="border:0;"
                                            allowfullscreen=""
                                            loading="lazy"
                                            referrerpolicy="no-referrer-when-downgrade"
                                        ></iframe>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-7 col-md-7 col-12">
                            <h4 class="font-28 fw-bold mb-4 pb-2 heading_brdr ms-0">Uttrakhand Tour and Travels Enquiry</h4>
                            <div class="card rounded-0 bg-light">
                                <div class="card-body p-lg-4 p-3">
                                    <form id="contactForm">
                                        <div class="row">
                                            <div class="col-12">
                                                <div class="form-group mb-3 mb-md-2 mb-lg-3">
                                                    <label for="name" class="form-label fw-600 mb-1">
                                                        Name
                                                        <star class="text-danger fw-bold">*</star>
                                                    </label>
                                                    <input
                                                        type="text"
                                                        class="form-control"
                                                        id="name"
                                                        placeholder="Enter Name"
                                                    >
                                                </div>
                                            </div>
                                            <div class="col-12">
                                                <div class="form-group mb-3 mb-md-2 mb-lg-3">
                                                    <label for="email" class="form-label fw-600 mb-1">
                                                        Email
                                                        <star class="text-danger fw-bold">*</star>
                                                    </label>
                                                    <input
                                                        type="text"
                                                        class="form-control"
                                                        id="email"
                                                        placeholder="Enter Email"
                                                    >
                                                </div>
                                            </div>
                                            <div class="col-12">
                                                <div class="form-group mb-3 mb-md-2 mb-lg-3">
                                                    <label for="mob_no" class="form-label fw-600 mb-1">
                                                        Number
                                                        <star class="text-danger fw-bold">*</star>
                                                    </label>
                                                    <input
                                                        type="text"
                                                        class="form-control"
                                                        id="mob_no"
                                                        placeholder="Enter Number"
                                                    >
                                                </div>
                                            </div>
                                            <div class="col-md-12 col-12">
                                                <div class="form-group mb-lg-4 mb-3">
                                                    <label for="details" class="form-label fw-600 mb-1">
                                                        Details
                                                        <star class="text-danger fw-bold">*</star>
                                                    </label>
                                                    <textarea
                                                        class="form-control"
                                                        rows="5"
                                                        id="details"
                                                        placeholder="Enter Details"
                                                    ></textarea>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="row align-items-center">
                                            <div class="col-auto">
                                                <button class="btn btn-primary" type="submit">Submit</button>
                                            </div>
                                            <div class="col text-end">
                                                <a href="index.html" class="text-decoration-none fw-600 text-14" id="clear_form">Clear Form</a>
                                            </div>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    <footer class="footer-component"></footer>

<script>
document.getElementById('clear_form').addEventListener('click', function(e) {
    e.preventDefault(); // Prevent the default action of the link
    document.getElementById('contactForm').reset(); // Reset the form fields
});
</script>
